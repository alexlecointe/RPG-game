databases:
  - name: rpg-postgres
    plan: starter
    databaseName: rpg_agent
    user: rpg_agent

services:
  - type: redis
    name: rpg-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: rpg-agent-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: BACKEND_PUBLIC_URL
        value: https://rpg-agent-api.onrender.com
      - key: AGENT_MODE
        value: auto
      - key: TOOLS_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: DAILY_FREE_CREDITS
        value: "50"
      - key: CREDITS_CAP
        value: "150"
      - key: MISSION_REFUND_ON_FAIL_PERCENT
        value: "50"
      - key: DATABASE_URL
        fromDatabase:
          name: rpg-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rpg-redis
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_BILLING_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VIDEO_MODEL
        sync: false
      - key: ADS_VIDEO_PROVIDER
        value: auto
      - key: ADS_VIDEO_R2_REQUIRED
        value: "false"
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_IMAGE_MODEL_STANDARD
        value: black-forest-labs/flux-schnell
      - key: REPLICATE_IMAGE_MODEL_PREMIUM
        value: black-forest-labs/flux-1.1-pro
      - key: WEBSITE_IMAGE_QUALITY
        value: premium
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  - type: worker
    name: rpg-agent-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info -Q missions,ads,default
    envVars:
      - key: APP_ENV
        value: production
      - key: BACKEND_PUBLIC_URL
        value: https://rpg-agent-api.onrender.com
      - key: AGENT_MODE
        value: auto
      - key: TOOLS_ENABLED
        value: "true"
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      - key: DATABASE_URL
        fromDatabase:
          name: rpg-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rpg-redis
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_BILLING_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VIDEO_MODEL
        sync: false
      - key: ADS_VIDEO_PROVIDER
        value: auto
      - key: ADS_VIDEO_R2_REQUIRED
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_IMAGE_MODEL_STANDARD
        value: black-forest-labs/flux-schnell
      - key: REPLICATE_IMAGE_MODEL_PREMIUM
        value: black-forest-labs/flux-1.1-pro
      - key: WEBSITE_IMAGE_QUALITY
        value: premium
      - key: META_PIXEL_ID
        sync: false
      - key: META_CAPI_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: META_PAGE_ID
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  - type: worker
    name: rpg-agent-beat
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rpg-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rpg-redis
          property: connectionString
